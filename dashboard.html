<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ByteChief AI — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* --- Minimal styles (keep your original CSS) --- */
body{margin:0;font-family:'Outfit',sans-serif;background:#000;color:#fff;}
.topbar{height:52px;background:#111;display:flex;align-items:center;padding:0 12px;gap:8px;}
.layout{display:flex;height:calc(100vh - 52px);}
.sidebar{width:240px;background:#111;display:flex;flex-direction:column;}
.main{flex:1;display:flex;flex-direction:column;}
.messages{flex:1;overflow-y:auto;padding:16px;}
.input-bar{padding:8px;background:#111;display:flex;gap:6px;}
textarea{flex:1;background:none;color:#fff;border:none;resize:none;outline:none;}
.send-btn, .mic-btn{background:#4f46e5;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;}
.toast{position:fixed;top:60px;right:10px;background:#222;padding:8px 12px;border-radius:8px;color:#0f0;margin-top:6px;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>

<header class="topbar">
  <div>ByteChief AI</div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div style="padding:12px;">Conversations Sidebar</div>
  </aside>

  <main class="main">
    <div class="messages" id="messages">
      <div>Welcome to ByteChief AI. Type a message or use voice commands.</div>
    </div>
    <div class="input-bar">
      <textarea id="msgInput" placeholder="Type a command..." rows="1"></textarea>
      <button class="mic-btn" id="micBtn">🎙️</button>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </main>
</div>

<div id="toasts"></div>

<script>
// ====== CONTACT LIST ======
const CONTACTS = {
  'queen': '+2348012345678',
  'samuel': '+2348098765432'
};

// ====== PERMISSIONS ======
const BC = {
  micGranted: localStorage.getItem('bc_mic')==='1',
  callGranted: localStorage.getItem('bc_calls')==='1',
  smsGranted: localStorage.getItem('bc_sms')==='1',
  appsGranted: localStorage.getItem('bc_apps')==='1',
};

// ====== TOAST HELPER ======
function showToast(msg, type='ok'){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// ====== ESCAPE HTML ======
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ====== SEND MESSAGE ======
function sendMsg(){
  const input = document.getElementById('msgInput');
  const txt = input.value.trim();
  if(!txt) return;
  addMsg('out', txt);
  input.value = '';
  runCommand(txt);
}

// ====== ADD MESSAGE ======
function addMsg(type, text){
  const row = document.createElement('div');
  row.className = 'msg-row '+type;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = esc(text);
  row.appendChild(bubble);
  document.getElementById('messages').appendChild(row);
  row.scrollIntoView({behavior:'smooth'});
}

// ====== COMMAND ENGINE ======
function runCommand(msg){
  msg = msg.trim().toLowerCase();

  // --- Call ---
  let m;
  if(m = msg.match(/^(call|phone|ring|dial)\s+(.+)/)){
    if(!BC.callGranted){ showToast('Call permission denied','err'); return; }
    let name = m[2].trim();
    let number = CONTACTS[name] || name;
    addMsg('in', `Calling ${name}...`);
    setTimeout(()=>{ window.location.href = `tel:${encodeURIComponent(number)}`; },900);
    return;
  }

  // --- SMS ---
  if(m = msg.match(/^(send\s+)?(sms|text|message)\s+to\s+([^:,\n]+)[,:\s]\s*(.+)/)){
    if(!BC.smsGranted){ showToast('SMS permission denied','err'); return; }
    let to = CONTACTS[m[3].trim().toLowerCase()] || m[3].trim();
    let body = m[4].trim();
    addMsg('in', `Sending SMS to ${m[3]}...`);
    setTimeout(()=>{ window.location.href = `sms:${encodeURIComponent(to)}?body=${encodeURIComponent(body)}`; },900);
    return;
  }

  // --- WhatsApp message ---
  if(m = msg.match(/^(send\s+)?(whatsapp|wa)\s+(message\s+|msg\s+)?to\s+([^:,\n]+)[,:\s]\s*(.+)/)){
    if(!BC.appsGranted){ showToast('Apps permission denied','err'); return; }
    let to = CONTACTS[m[4].trim().toLowerCase()] || m[4].trim();
    let text = m[5].trim();
    addMsg('in', `Sending WhatsApp to ${m[4]}...`);
    const isNum = /^\+?\d[\d\s\-()]{6,}$/.test(to);
    if(isNum){
      const ph = to.replace(/\D/g,'');
      setTimeout(()=>{ window.location.href=`intent://send/${ph}#Intent;scheme=smsto;package=com.whatsapp;end`; },900);
      setTimeout(()=>{ window.open(`https://wa.me/${ph}?text=${encodeURIComponent(text)}`,'_blank'); },2400);
    } else {
      setTimeout(()=>{ window.open(`https://wa.me/?text=${encodeURIComponent(text + ' - from ' + to)}`,'_blank'); },900);
    }
    return;
  }

  // --- Open apps ---
  const APPS = {
    'whatsapp':'intent://launch#Intent;package=com.whatsapp;scheme=whatsapp;end|https://web.whatsapp.com',
    'youtube':'intent://launch#Intent;package=com.google.android.youtube;end|https://m.youtube.com',
    'instagram':'intent://launch#Intent;package=com.instagram.android;end|https://www.instagram.com',
    'maps':'intent://launch#Intent;package=com.google.android.apps.maps;end|https://maps.google.com',
    'camera':'intent:#Intent;action=android.media.action.STILL_IMAGE_CAMERA;end',
    'settings':'intent:#Intent;action=android.settings.SETTINGS;end'
  };
  if(msg.startsWith('open ')){
    let app = msg.replace('open ','').trim();
    if(APPS[app]){
      if(!BC.appsGranted){ showToast('Apps permission denied','err'); return; }
      addMsg('in', `Opening ${app}...`);
      let parts = APPS[app].split('|');
      setTimeout(()=>{ window.location.href=parts[0]; },900);
      if(parts[1]) setTimeout(()=>{ window.open(parts[1],'_blank'); },2400);
      return;
    }
  }

  // --- Fallback ---
  addMsg('in', "Sorry, I didn't understand that command.");
  showToast("Command not recognized","err");
}

// ====== EVENT LISTENERS ======
document.getElementById('sendBtn').addEventListener('click',sendMsg);
document.getElementById('msgInput').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
});
</script>

</body>
</html>
