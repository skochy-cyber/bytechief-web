<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#4f46e5">
<meta name="description" content="ByteChief AI — Your intelligent AI assistant on the web. Chat, voice commands, and simulate phone actions.">
<meta property="og:title" content="ByteChief AI">
<meta property="og:description" content="Your intelligent AI assistant — chat, voice, and phone commands.">
<meta property="og:image" content="/assets/og-image.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ByteChief AI">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/assets/icon-512.png">
<title>ByteChief AI — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--surface:#080808;--card:#0d0d0d;--border:#1a1a1a;--text:#fff;--muted:#666;--primary:#4f46e5;--r:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
/* NAV */
nav{padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
.nav-left{display:flex;align-items:center;gap:10px;}
.nav-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.95rem;text-decoration:none;color:var(--text);}
.nav-logo img{height:24px;width:24px;border-radius:5px;object-fit:cover;}
.user-badge{background:rgba(79,70,229,.15);border:1px solid rgba(79,70,229,.3);border-radius:6px;padding:.22rem .7rem;font-size:.75rem;color:#818cf8;}
.nav-right{display:flex;align-items:center;gap:8px;}
.nav-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.35rem .8rem;border-radius:8px;font-size:.8rem;cursor:pointer;font-family:inherit;transition:.2s;}
.nav-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.nav-btn.danger{color:#ef4444;border-color:rgba(239,68,68,.25);}
.nav-btn.danger:hover{background:rgba(239,68,68,.1);}
/* LAYOUT */
.chat-wrap{display:flex;flex:1;overflow:hidden;}
/* SIDEBAR */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-head{padding:16px;border-bottom:1px solid var(--border);}
.sidebar-head h3{font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-weight:600;}
.new-chat-btn{display:flex;align-items:center;gap:8px;padding:.6rem .9rem;background:rgba(79,70,229,.15);border:1px solid rgba(79,70,229,.3);border-radius:8px;color:#818cf8;font-size:.85rem;font-weight:600;cursor:pointer;width:100%;margin-top:10px;font-family:inherit;transition:.2s;}
.new-chat-btn:hover{background:rgba(79,70,229,.25);}
.history-list{flex:1;overflow-y:auto;padding:8px;}
.history-item{padding:.6rem .8rem;border-radius:8px;cursor:pointer;font-size:.83rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.15s;border:1px solid transparent;}
.history-item:hover{background:rgba(255,255,255,.04);color:var(--text);}
.history-item.active{background:rgba(79,70,229,.1);color:#818cf8;border-color:rgba(79,70,229,.2);}
.sidebar-foot{padding:12px;border-top:1px solid var(--border);}
.user-info{display:flex;align-items:center;gap:8px;}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0;}
.user-name{font-size:.82rem;font-weight:600;}
.user-email{font-size:.72rem;color:var(--muted);}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
.msg{display:flex;gap:10px;align-items:flex-start;animation:msgIn .3s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;}
.msg-avatar.ai{background:linear-gradient(135deg,#4f46e5,#7c3aed);}
.msg-avatar.user{background:#1a1a1a;border:1px solid var(--border);}
.msg-bubble{max-width:72%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 16px;font-size:.9rem;line-height:1.65;}
.msg.user .msg-bubble{background:rgba(79,70,229,.15);border-color:rgba(79,70,229,.3);}
.msg-time{font-size:.68rem;color:var(--muted);margin-top:5px;}
.msg-action{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:8px 12px;margin-top:8px;font-size:.82rem;color:#4ade80;display:flex;align-items:center;gap:6px;}
.typing{display:flex;gap:5px;align-items:center;padding:8px 14px;}
.typing span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:typingBounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}
/* WELCOME STATE */
.welcome-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
.welcome-state img{width:64px;height:64px;border-radius:16px;margin-bottom:18px;}
.welcome-state h2{font-size:1.4rem;font-weight:700;margin-bottom:8px;}
.welcome-state p{color:var(--muted);font-size:.9rem;max-width:360px;margin-bottom:28px;}
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.qa-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;font-size:.82rem;color:var(--muted);cursor:pointer;font-family:inherit;transition:.2s;}
.qa-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
/* INPUT */
.input-area{padding:16px 20px;border-top:1px solid var(--border);background:var(--surface);}
.input-row{display:flex;gap:8px;align-items:flex-end;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:8px 12px;transition:.2s;}
.input-row:focus-within{border-color:rgba(79,70,229,.5);}
#msgInput{flex:1;background:none;border:none;color:var(--text);font-family:inherit;font-size:.92rem;resize:none;outline:none;max-height:100px;min-height:22px;line-height:1.5;}
#msgInput::placeholder{color:var(--muted);}
.voice-btn,.send-btn{background:none;border:none;cursor:pointer;padding:.3rem;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0;}
.voice-btn{color:var(--muted);font-size:1.1rem;}
.voice-btn:hover,.voice-btn.active{color:#4ade80;}
.voice-btn.active{animation:voicePulse 1s infinite;}
@keyframes voicePulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.send-btn{background:var(--primary);color:#fff;width:34px;height:34px;border-radius:8px;}
.send-btn:hover{background:#4338ca;}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}
.input-hint{text-align:center;font-size:.72rem;color:var(--muted);margin-top:8px;}
/* TOAST */
.toast-wrap{position:fixed;bottom:80px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:999;}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:.83rem;max-width:280px;animation:toastIn .3s ease;}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.toast.ok{border-color:rgba(34,197,94,.3);color:#4ade80;}
.toast.err{border-color:rgba(239,68,68,.3);color:#f87171;}
/* ACTION OVERLAY */
.action-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;text-align:center;max-width:360px;width:90%;}
.action-icon{font-size:3rem;margin-bottom:16px;}
.action-card h3{font-size:1.2rem;font-weight:700;margin-bottom:8px;}
.action-card p{color:var(--muted);font-size:.9rem;margin-bottom:24px;}
.action-btns{display:flex;gap:10px;justify-content:center;}
.ac-btn{padding:.7rem 1.6rem;border-radius:10px;font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;border:none;transition:.2s;}
.ac-btn.ok{background:var(--primary);color:#fff;}
.ac-btn.ok:hover{background:#4338ca;}
.ac-btn.cancel{background:var(--card);border:1px solid var(--border);color:var(--muted);}
.ac-btn.cancel:hover{color:var(--text);}
@media(max-width:768px){.sidebar{display:none;}.msg-bubble{max-width:88%;}}
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <a href="/" class="nav-logo"><img src="assets/logo-dark.png" alt="">ByteChief AI</a>
    <span class="user-badge" id="modelBadge">llama-3.3-70b</span>
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="downloadHistory()">⬇ Export</button>
    <button class="nav-btn danger" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="chat-wrap">
  <aside class="sidebar">
    <div class="sidebar-head">
      <h3>Conversations</h3>
      <button class="new-chat-btn" onclick="newChat()">✦ New Chat</button>
    </div>
    <div class="history-list" id="historyList"></div>
    <div class="sidebar-foot">
      <div class="user-info">
        <div class="user-avatar" id="userAv">?</div>
        <div>
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-email" id="userEmail">-</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="messages" id="messages">
      <div class="welcome-state" id="welcomeState">
        <img src="assets/logo-dark.png" alt="ByteChief AI">
        <h2>ByteChief AI is ready</h2>
        <p>Ask me anything — code, math, writing, or try a voice command!</p>
        <div class="quick-actions">
          <button class="qa-btn" onclick="quickSend('Help me write a function in JavaScript')">💻 JS Help</button>
          <button class="qa-btn" onclick="quickSend('Call John')">📞 Simulate Call</button>
          <button class="qa-btn" onclick="quickSend('What can you do?')">🤖 Capabilities</button>
          <button class="qa-btn" onclick="quickSend('Send SMS to Mum: I am on my way')">📨 SMS Demo</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="msgInput" placeholder="Ask ByteChief AI anything..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Voice input">🎙️</button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-hint">ByteChief AI · Powered by Groq · <a href="terms.html" style="color:#555;text-decoration:none;">Terms of Use</a></div>
    </div>
  </main>
</div>

<div class="toast-wrap" id="toasts"></div>
<div class="action-overlay" id="actionOverlay" style="display:none;">
  <div class="action-card">
    <div class="action-icon" id="actionIcon">📞</div>
    <h3 id="actionTitle">Simulated Action</h3>
    <p id="actionDesc">ByteChief AI would execute this command on a real device.</p>
    <div class="action-btns">
      <button class="ac-btn ok" onclick="closeAction()">Got it ✓</button>
      <button class="ac-btn cancel" onclick="closeAction()">Dismiss</button>
    </div>
  </div>
</div>

<script src="js/voice.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let token  = localStorage.getItem('bc_token');
let user   = null;
let history = [];
let isTyping = false;

// ── Init ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  if (!token) { window.location.href = 'login.html'; return; }
  try {
    const r = await api('/api/auth/verify');
    if (!r.user) throw new Error('invalid');
    user = r.user;
    setUserUI();
    loadHistory();
  } catch {
    localStorage.removeItem('bc_token');
    window.location.href = 'login.html';
  }
});

function setUserUI() {
  const name  = user.name || user.email?.split('@')[0] || 'User';
  const email = user.email || '';
  document.getElementById('userName').textContent  = name;
  document.getElementById('userEmail').textContent = email;
  document.getElementById('userAv').textContent    = name.charAt(0).toUpperCase();
}

// ── API helper ─────────────────────────────────────────────────────────────
async function api(url, opts = {}) {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token, ...(opts.headers || {}) },
    ...opts,
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Request failed'); }
  return res.json();
}

// ── Send message ───────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || isTyping) return;

  document.getElementById('welcomeState')?.remove();
  input.value = '';
  autoResize(input);
  history.push({ role: 'user', content: text });
  appendMsg('user', text);
  showTyping();
  document.getElementById('sendBtn').disabled = true;
  isTyping = true;

  try {
    const data = await api('/api/chat', {
      method: 'POST',
      body: JSON.stringify({ message: text, history: history.slice(-10) }),
    });
    hideTyping();
    history.push({ role: 'assistant', content: data.response });
    appendMsg('ai', data.response);
    if (data.action) showAction(data.action);
    refreshHistory();
  } catch (e) {
    hideTyping();
    appendMsg('ai', '⚠️ ' + (e.message || 'Something went wrong. Please try again.'));
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function quickSend(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

// ── Render messages ────────────────────────────────────────────────────────
function appendMsg(role, text) {
  const wrap  = document.getElementById('messages');
  const div   = document.createElement('div');
  div.className = `msg ${role}`;
  const time  = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const init  = role === 'ai' ? '🤖' : (user?.name?.charAt(0).toUpperCase() || 'U');
  const html  = role === 'ai' ? formatAI(text) : escHtml(text);
  div.innerHTML = `
    <div class="msg-avatar ${role}">${init}</div>
    <div>
      <div class="msg-bubble">${html}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function formatAI(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code style="background:rgba(255,255,255,.08);padding:.1rem .35rem;border-radius:4px;font-size:.88em;">$1</code>')
    .replace(/\n/g,'<br>');
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showTyping() {
  const wrap = document.getElementById('messages');
  const el = document.createElement('div');
  el.id = 'typing'; el.className = 'msg';
  el.innerHTML = `<div class="msg-avatar ai">🤖</div><div class="msg-bubble typing"><span></span><span></span><span></span></div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

function hideTyping() {
  document.getElementById('typing')?.remove();
}

// ── Action overlay ─────────────────────────────────────────────────────────
function showAction(action) {
  const icons = { call:'📞', sms:'📨', open:'📱' };
  const titles = { call:`Calling ${action.target}`, sms:`SMS to ${action.target}`, open:`Opening ${action.target}` };
  const descs  = {
    call: `ByteChief AI would initiate a phone call to "${action.target}" on a real device.`,
    sms:  `Message: "${action.smsMessage || 'sent'}" would be sent to ${action.target}.`,
    open: `The app "${action.target}" would be launched on a real device.`,
  };
  document.getElementById('actionIcon').textContent  = icons[action.type]  || '⚡';
  document.getElementById('actionTitle').textContent = titles[action.type] || 'Action Triggered';
  document.getElementById('actionDesc').textContent  = descs[action.type]  || 'Action executed.';
  document.getElementById('actionOverlay').style.display = 'flex';
}

function closeAction() {
  document.getElementById('actionOverlay').style.display = 'none';
}

// ── History sidebar ────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const data = await api('/api/commands/history');
    renderHistorySidebar(data.logs || []);
  } catch {}
}

function refreshHistory() { loadHistory(); }

function renderHistorySidebar(logs) {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  if (!logs.length) {
    list.innerHTML = '<div style="padding:12px;color:var(--muted);font-size:.8rem;">No history yet</div>';
    return;
  }
  logs.slice(0, 30).forEach(log => {
    const d = document.createElement('div');
    d.className = 'history-item';
    d.textContent = log.command?.slice(0, 35) || 'Message';
    d.title = log.command || '';
    d.onclick = () => {
      document.getElementById('welcomeState')?.remove();
      appendMsg('user', log.command);
      appendMsg('ai', log.response);
    };
    list.appendChild(d);
  });
}

function newChat() {
  history = [];
  document.getElementById('messages').innerHTML = '';
  const ws = document.createElement('div');
  ws.id = 'welcomeState'; ws.className = 'welcome-state';
  ws.innerHTML = `<img src="assets/logo-dark.png" alt="ByteChief AI"><h2>New chat started</h2><p>What would you like help with?</p><div class="quick-actions"><button class="qa-btn" onclick="quickSend('Help me write a function in JavaScript')">💻 JS Help</button><button class="qa-btn" onclick="quickSend('Call John')">📞 Simulate Call</button><button class="qa-btn" onclick="quickSend('What can you do?')">🤖 Capabilities</button></div>`;
  document.getElementById('messages').appendChild(ws);
}

// ── Download ───────────────────────────────────────────────────────────────
async function downloadHistory() {
  try {
    const data = await api('/api/commands/history');
    const text = (data.logs || []).map(l =>
      `[${new Date(l.createdAt).toLocaleString()}]\nYou: ${l.command}\nByteChief: ${l.response}\n`
    ).join('\n---\n\n');
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bytechief-history.txt';
    a.click();
    toast('History downloaded ✓', 'ok');
  } catch { toast('Download failed', 'err'); }
}

// ── Voice ──────────────────────────────────────────────────────────────────
let voiceManager = null;
function toggleVoice() {
  const btn = document.getElementById('voiceBtn');
  if (!voiceManager) {
    voiceManager = new VoiceManager({
      onResult: (text) => {
        document.getElementById('msgInput').value = text;
        autoResize(document.getElementById('msgInput'));
      },
      onStart: () => btn.classList.add('active'),
      onEnd:   () => btn.classList.remove('active'),
    });
  }
  voiceManager.toggle();
}

// ── Logout ─────────────────────────────────────────────────────────────────
function logout() {
  localStorage.removeItem('bc_token');
  localStorage.removeItem('bc_user');
  window.location.href = 'login.html';
}

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}
</script>
</body>
</html>
