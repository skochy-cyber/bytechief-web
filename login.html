<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#4f46e5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ByteChief AI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/assets/favicon.ico">
<style>
:root{--bg:#000;--surface:#0a0a0a;--card:#0d0d0d;--border:#1a1a1a;--text:#fff;--muted:#555;--primary:#4f46e5;--r:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
.bg-g{position:fixed;top:-30%;left:-20%;width:70vw;height:70vw;background:radial-gradient(circle,rgba(79,70,229,.08)0%,transparent 60%);z-index:0;pointer-events:none;}
nav{position:relative;z-index:10;padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.95rem;text-decoration:none;color:var(--text);}
.nav-logo img{height:24px;width:24px;border-radius:5px;object-fit:cover;}
nav a.link{color:var(--muted);text-decoration:none;font-size:.85rem;transition:.2s;}nav a.link:hover{color:var(--text);}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:44px 36px;width:100%;max-width:400px;}
.card-head{text-align:center;margin-bottom:28px;}
.card-head img{width:52px;height:52px;border-radius:14px;margin-bottom:14px;}
.card-head h1{font-size:1.6rem;font-weight:800;margin-bottom:5px;}
.card-head p{color:var(--muted);font-size:.88rem;}
.form-group{margin-bottom:15px;}
.form-label{display:block;font-size:.82rem;font-weight:600;margin-bottom:5px;color:#ccc;}
.form-input{width:100%;padding:.78rem 1rem;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:.92rem;transition:.2s;outline:none;}
.form-input:focus{border-color:rgba(79,70,229,.6);box-shadow:0 0 0 3px rgba(79,70,229,.1);}
.form-input::placeholder{color:var(--muted);}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:18px;}
.remember-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--primary);}
.remember-row label{font-size:.83rem;color:var(--muted);cursor:pointer;}
.btn-submit{width:100%;padding:.88rem;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:var(--r);font-family:inherit;font-size:.97rem;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-submit:hover{opacity:.9;}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}
.err-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:var(--r);padding:.7rem 1rem;font-size:.83rem;color:#f87171;margin-bottom:14px;display:none;}
.err-box.show{display:block;}
.bottom{text-align:center;margin-top:20px;font-size:.85rem;color:var(--muted);}
.bottom a{color:#818cf8;text-decoration:none;}
footer{position:relative;z-index:1;text-align:center;padding:16px;font-size:.75rem;color:var(--muted);}
footer a{color:var(--muted);text-decoration:none;}
</style>
</head>
<body>
<div class="bg-g"></div>
<nav>
  <a href="/" class="nav-logo"><img src="/assets/logo-dark.png" alt="">ByteChief AI</a>
  <a href="signup.html" class="link">Create account →</a>
</nav>
<div class="wrap">
  <div class="card">
    <div class="card-head">
      <img src="/assets/logo-dark.png" alt="ByteChief AI">
      <h1>Welcome back</h1>
      <p>Log in to your ByteChief AI account</p>
    </div>
    <div class="err-box" id="errBox"></div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Your password" required autocomplete="current-password">
      </div>
      <div class="remember-row">
        <input type="checkbox" id="rememberMe" checked>
        <label for="rememberMe">Remember me on this device</label>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">🔐 Log In</button>
    </form>
    <div class="bottom">Don't have an account? <a href="signup.html">Sign up free →</a></div>
  </div>
</div>
<footer><a href="terms.html">Terms of Use</a> · ByteChief AI 2026</footer>
<script>
// ── Session helpers ──────────────────────────────────────────────────────────
function saveSession(token, user, remember) {
  // Always save to sessionStorage (survives tab refresh)
  sessionStorage.setItem('bc_token', token);
  sessionStorage.setItem('bc_user',  JSON.stringify(user));
  // If remember checked, also save to localStorage (survives app close/reopen)
  if (remember) {
    localStorage.setItem('bc_token', token);
    localStorage.setItem('bc_user',  JSON.stringify(user));
    localStorage.setItem('bc_remember', '1');
  } else {
    localStorage.removeItem('bc_token');
    localStorage.removeItem('bc_user');
    localStorage.removeItem('bc_remember');
  }
}

function getToken() {
  return sessionStorage.getItem('bc_token') || localStorage.getItem('bc_token') || null;
}

// ── Auto-redirect if already logged in ──────────────────────────────────────
(async function checkSession() {
  const token = getToken();
  if (!token) return;
  try {
    const r = await fetch('/api/auth/verify', { headers: { Authorization: 'Bearer ' + token } });
    if (r.ok) {
      // Valid session — sync to sessionStorage if only in localStorage
      sessionStorage.setItem('bc_token', token);
      window.location.replace('dashboard.html');
    } else {
      // Token expired — clear everything
      ['bc_token','bc_user','bc_remember'].forEach(k => { localStorage.removeItem(k); sessionStorage.removeItem(k); });
    }
  } catch {}
})();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errBox');
  const remember = document.getElementById('rememberMe').checked;
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = '⏳ Logging in...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    saveSession(data.token, data.user, remember);
    btn.textContent = '✅ Success!';
    setTimeout(() => window.location.replace('dashboard.html'), 500);
  } catch (e) {
    err.textContent = e.message;
    err.classList.add('show');
    btn.disabled = false; btn.textContent = '🔐 Log In';
  }
});
</script>
</body>
</html>
