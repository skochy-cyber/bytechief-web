<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#4f46e5">
<meta name="description" content="ByteChief AI — Your intelligent AI assistant on the web. Chat, voice commands, and simulate phone actions.">
<meta property="og:title" content="ByteChief AI">
<meta property="og:description" content="Your intelligent AI assistant — chat, voice, and phone commands.">
<meta property="og:image" content="/assets/og-image.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ByteChief AI">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/assets/icon-512.png">
<title>ByteChief AI — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--surface:#0a0a0a;--card:#0d0d0d;--border:#1a1a1a;--text:#fff;--muted:#555;--primary:#4f46e5;--r:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
.bg-g{position:fixed;top:-30%;right:-20%;width:70vw;height:70vw;background:radial-gradient(circle,rgba(124,58,237,.07)0%,transparent 60%);z-index:0;pointer-events:none;}
nav{position:relative;z-index:10;padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.95rem;text-decoration:none;color:var(--text);}
.nav-logo img{height:24px;width:24px;border-radius:5px;object-fit:cover;}
nav a{color:var(--muted);text-decoration:none;font-size:.85rem;transition:.2s;}nav a:hover{color:var(--text);}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:44px 38px;width:100%;max-width:420px;}
.card-head{text-align:center;margin-bottom:28px;}
.card-head img{width:52px;height:52px;border-radius:14px;margin-bottom:14px;}
.card-head h1{font-size:1.6rem;font-weight:800;margin-bottom:6px;}
.card-head p{color:var(--muted);font-size:.88rem;}
.form-group{margin-bottom:15px;}
.form-label{display:block;font-size:.82rem;font-weight:600;margin-bottom:5px;color:#ccc;}
.form-input{width:100%;padding:.78rem 1rem;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:.92rem;transition:.2s;outline:none;}
.form-input:focus{border-color:rgba(79,70,229,.6);box-shadow:0 0 0 3px rgba(79,70,229,.12);}
.form-input::placeholder{color:var(--muted);}
.pw-hint{font-size:.73rem;color:var(--muted);margin-top:4px;}
.btn-submit{width:100%;padding:.88rem;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:var(--r);font-family:inherit;font-size:.97rem;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-submit:hover{opacity:.9;transform:translateY(-1px);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.78rem;margin:16px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.google-btn{width:100%;padding:.82rem;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:var(--r);color:var(--muted);font-family:inherit;font-size:.88rem;cursor:not-allowed;display:flex;align-items:center;justify-content:center;gap:9px;position:relative;}
.soon{position:absolute;right:14px;background:rgba(79,70,229,.2);color:#818cf8;font-size:.6rem;font-weight:700;padding:.15rem .5rem;border-radius:4px;text-transform:uppercase;}
.err-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:var(--r);padding:.7rem 1rem;font-size:.83rem;color:#f87171;margin-bottom:14px;display:none;}
.err-box.show{display:block;}
.ok-box{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:var(--r);padding:.7rem 1rem;font-size:.83rem;color:#4ade80;margin-bottom:14px;display:none;}
.ok-box.show{display:block;}
.terms-note{font-size:.75rem;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5;}
.terms-note a{color:#818cf8;text-decoration:none;}
.bottom{text-align:center;margin-top:18px;font-size:.85rem;color:var(--muted);}
.bottom a{color:#818cf8;text-decoration:none;}
footer{position:relative;z-index:1;text-align:center;padding:20px;font-size:.78rem;color:var(--muted);}
footer a{color:var(--muted);text-decoration:none;}footer a:hover{color:var(--text);}
</style>
</head>
<body>
<div class="bg-g"></div>
<nav>
  <a href="/" class="nav-logo"><img src="assets/logo-dark.png" alt="">ByteChief AI</a>
  <a href="login.html">Already have an account? →</a>
</nav>

<div class="wrap">
  <div class="card">
    <div class="card-head">
      <img src="assets/logo-dark.png" alt="ByteChief AI">
      <h1>Create your account</h1>
      <p>Start chatting with ByteChief AI for free</p>
    </div>
    <div class="err-box" id="errBox"></div>
    <div class="ok-box"  id="okBox"></div>
    <form id="signupForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="Obasanjo Samuel" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" required autocomplete="new-password">
        <div class="pw-hint">At least 6 characters</div>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">🚀 Create Account</button>
    </form>
    <div class="divider">or</div>
    <div class="google-btn">
      <svg width="17" height="17" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign up with Google <span class="soon">Soon</span>
    </div>
    <div class="terms-note">By creating an account you agree to our <a href="terms.html">Terms of Use</a></div>
    <div class="bottom">Already have an account? <a href="login.html">Log in →</a></div>
  </div>
</div>

<footer><a href="terms.html">Terms of Use</a> · ByteChief AI 2026</footer>

<script>
if (localStorage.getItem('bc_token')) window.location.href = 'dashboard.html';

document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errBox');
  const ok  = document.getElementById('okBox');
  err.classList.remove('show'); ok.classList.remove('show');
  btn.disabled = true; btn.textContent = '⏳ Creating account...';

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        name:     document.getElementById('name').value.trim(),
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Registration failed');
    localStorage.setItem('bc_token', data.token);
    localStorage.setItem('bc_user',  JSON.stringify(data.user));
    ok.textContent = '✅ Account created! Redirecting...';
    ok.classList.add('show');
    btn.textContent = '✅ Done!';
    setTimeout(() => window.location.href = 'dashboard.html', 900);
  } catch (e) {
    err.textContent = e.message;
    err.classList.add('show');
    btn.disabled = false; btn.textContent = '🚀 Create Account';
  }
});
</script>
</body>
</html>
